<!DOCTYPE html>
<html>
<head>
<title>SparkLearn</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="splash">
  <img src="images/logo.png">
</div>

<div class="app">

  <div class="sidebar">
    <h2>SparkLearn</h2>

    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('about')">About</a>
    <a onclick="showPage('courses')">Courses</a>
    <a onclick="showPage('contact')">Contact</a>
  </div>

  <div class="content">

    <div id="home" class="page active">
      <h1>Welcome</h1>

      <div class="gallery">
        <img src="images/campus.png">
        <img src="images/classroom.png">
        <img src="images/computer-lab.png">
        <img src="images/faculty.png">
      </div>

      <div class="login-section">
        <h2>Login</h2>
        <input placeholder="Username">
        <input placeholder="Password">
        <button>Login</button>
        <button>Register</button>
      </div>
    </div>

    <div id="about" class="page">
      <h1>About</h1>
      <p>We teach skills.</p>
    </div>

    <div id="courses" class="page">
      <h1>Courses</h1>
      <p>Full Stack, Python, AI</p>
    </div>

    <div id="contact" class="page">
      <h1>Contact</h1>
      <p>+91 98765 43210</p>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
