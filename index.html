<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SparkLearn Academy</title>
<link rel="stylesheet" href="style.css">
</head>
<script src="script.js"></script>
<body>

<!-- SPLASH -->
<div id="splash">
  <img src="images/logo.png" alt="logo">
</div>

<!-- MAIN APP -->
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>SparkLearn</h2>

    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('about')">About</a>
    <a onclick="showPage('courses')">Courses</a>
    <a onclick="showPage('contact')">Contact</a>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- HOME -->
    <div id="home" class="page active">

      <h1>Welcome 🚀</h1>

      <!-- IMAGES SECTION -->
      <div class="gallery">
        <img src="images/campus.png">
        <img src="images/classroom.png">
        <img src="images/computer-lab.png">
        <img src="images/faculty.png">
      </div>

      <p style="margin-top:20px;">
        Scroll down to login 👇
      </p>

      <!-- LOGIN SECTION (BOTTOM OF PAGE) -->
      <div class="login-section">

        <h2>Login / Register</h2>

        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">

        <button>Login</button>
        <button class="register">Register</button>

      </div>

    </div>

    <!-- ABOUT -->
    <div id="about" class="page">
      <h1>About Us</h1>
      <p>We provide modern learning experience.</p>
    </div>

    <!-- COURSES -->
    <div id="courses" class="page">
      <h1>Courses</h1>

      <div class="card">Full Stack Development</div>
      <div class="card">Python Programming</div>
      <div class="card">Data Science</div>

    </div>

    <!-- CONTACT -->
    <div id="contact" class="page">
      <h1>Contact</h1>
      <p>📞 +91 987XX XXXXX</p>
    </div>

  </div>
</div>

<script src="script.js"></script>
<!-- MAIN APP -->
<div id="app">
  
<script src="js/script.js"></script>
</body>
</html>
