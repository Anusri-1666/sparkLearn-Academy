<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SparkLearn Academy</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <img src="images/logo.png" alt="logo">
</div>

<!-- LOGIN OVERLAY -->
<div id="loginBox">
  <div class="login-card">
    <h2>Login / Register</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Login</button>
    <button class="register">Register</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- LEFT DASHBOARD -->
  <div class="sidebar">
    <h2>SparkLearn</h2>

    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Courses</a>
    <a href="#">Contact</a>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <h1>Welcome to SparkLearn</h1>

    <p>Your learning dashboard</p>

    <!-- IMAGES SECTION -->
    <div class="gallery">
      <img src="images/campus.png">
      <img src="images/classroom.png">
      <img src="images/computer-lab.png">
      <img src="images/faculty.png">
    </div>

    <!-- CONTACT FAKE NUMBER -->
    <div class="contact-box">
      <h3>Contact Us</h3>
      <p>📞 +91 98765 43210</p>
    </div>

  </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
