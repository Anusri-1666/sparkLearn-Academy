<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>SparkLearn Academy | Register</title>
  <meta name="description" content="Register for SparkLearn Academy courses. Fill out the admission form to join our programs.">
  <meta name="keywords" content="register SparkLearn Academy, admission form, join courses, student registration">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="navbar">
    <div class="logo">SparkLearn</div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="courses.html">Courses</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a class="active" href="register.html">Register</a></li>
    </ul>
  </div>
</header>

<!-- ================= HERO ================= -->
<section class="hero" style="height:40vh;">
  <div class="hero-content">
    <h1>Student Registration</h1>
    <p>Join SparkLearn Academy and start your journey</p>
  </div>
</section>

<!-- ================= REGISTRATION FORM ================= -->
<section>
  <h2>Registration Form</h2>

  <form onsubmit="return validateRegisterForm()">

    <input type="text" id="sname" placeholder="Student Name" required>

    <input type="text" id="fname" placeholder="Father's Name" required>

    <input type="text" id="mname" placeholder="Mother's Name" required>

    <input type="date" id="dob" required>

    <select id="gender" required>
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>

    <input type="email" id="remail" placeholder="Email" required>

    <input type="text" id="phone" placeholder="Phone Number" required>

    <textarea id="address" rows="3" placeholder="Address" required></textarea>

    <select id="course" required>
      <option value="">Select Course</option>
      <option>Full Stack Development</option>
      <option>Python Programming</option>
      <option>Data Science</option>
      <option>UI/UX Design</option>
    </select>

    <input type="password" id="password" placeholder="Password" required>

    <input type="password" id="cpassword" placeholder="Confirm Password" required>

    <button type="submit">Register Now</button>

  </form>
</section>

<!-- ================= FOOTER ================= -->
<footer>

</footer>

<script src="script.js"></script>
</body>
</html>
